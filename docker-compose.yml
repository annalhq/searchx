
services:
  searxng:
    image: searxng/searxng:latest
    container_name: searchx_searxng
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - SEARXNG_SECRET=searchx_secret_key_change_me
    networks:
      - searchx_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: searchx_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    networks:
      - searchx_net
    depends_on:
      searxng:
        condition: service_healthy
    restart: unless-stopped

networks:
  searchx_net:
    driver: bridge
