# SearXNG settings

use_default_settings: true

server:
  # Secret key for sessions
  secret_key: "searchx_secret_key_change_me"
  # Support JSON format for our API
  formats:
    - html
    - json
  # Disable bot detection limiter so backend can query the API
  limiter: false

search:
  # Safe search 0: off, 1: moderate, 2: strict
  safe_search: 0
  # List of engines to use
  engines:
    - name: google
      shortcut: g
    - name: duckduckgo
      shortcut: ddg
    - name: wikipedia
      shortcut: w

ui:
  static_use_hash: true
